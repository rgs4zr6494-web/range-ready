<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏌️ Morning Flexibility — Range Ready</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  overflow: hidden;        /* lock the viewport — no scroll on TV */
  font-family: 'Segoe UI', Arial, sans-serif;
  background: #0d1a0d;
  color: #e8f5e9;
}

/* ── TOP BAR ── */
#topbar {
  background: #1a2e1a;
  padding: 8px 16px;
  display: flex;
  align-items: center;
  gap: 14px;
  border-bottom: 2px solid #66bb6a;
  flex-shrink: 0;
  height: 52px;
}
#topbar .home-link {
  font-size: 0.78rem; color: #66bb6a; text-decoration: none;
  white-space: nowrap; flex-shrink: 0;
}
#topbar .home-link:hover { color: #a5d6a7; }
#topbar-title {
  font-size: 1rem; font-weight: 700; color: #a5d6a7;
  flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
#topbar-meta {
  font-size: 0.72rem; color: #5a8a5a; white-space: nowrap; flex-shrink: 0;
}
#topbar-counter {
  font-size: 0.85rem; font-weight: 700; color: #66bb6a;
  white-space: nowrap; flex-shrink: 0;
}

/* ── PROGRESS BAR ── */
#progress-wrap {
  background: #1a2e1a; padding: 4px 16px 6px;
  border-bottom: 1px solid #2a3e2a; flex-shrink: 0;
}
#progress-bar-bg {
  background: #2a3e2a; border-radius: 6px; height: 6px; overflow: hidden;
}
#progress-bar-fill {
  background: linear-gradient(90deg, #2e7d32, #66bb6a);
  height: 100%; border-radius: 6px; transition: width 0.4s ease;
}

/* ── PAGE WRAPPER ── */
#page {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* ── MAIN ── */
#main {
  display: flex;
  flex: 1;
  overflow: hidden;
  min-height: 0;
}

/* ── SIDEBAR ── */
#sidebar {
  width: 210px;
  min-width: 210px;
  background: #111b11;
  overflow-y: auto;
  border-right: 1px solid #2a3a2a;
  flex-shrink: 0;
}
#sidebar::-webkit-scrollbar { width: 3px; }
#sidebar::-webkit-scrollbar-track { background: #111b11; }
#sidebar::-webkit-scrollbar-thumb { background: #2e5c2e; border-radius: 4px; }

.section-label {
  font-size: 0.58rem; font-weight: 700; color: #66bb6a;
  text-transform: uppercase; letter-spacing: 0.08em;
  padding: 8px 10px 3px; background: #182818;
  border-top: 1px solid #2a3a2a; border-bottom: 1px solid #1e2e1e;
}
.ex-item {
  display: flex; align-items: center;
  padding: 6px 10px; cursor: pointer;
  border-bottom: 1px solid #1a2a1a;
  transition: background 0.15s; gap: 8px;
}
.ex-item:hover { background: #1e3020; }
.ex-item.active { background: #1b3e1b; border-left: 3px solid #66bb6a; }
.ex-item.done { opacity: 0.55; }
.ex-num {
  font-size: 0.6rem; color: #4a6a4a; width: 16px;
  flex-shrink: 0; text-align: center;
}
.ex-check {
  font-size: 0.75rem; width: 14px; flex-shrink: 0; text-align: center;
}
.ex-name-short {
  font-size: 0.72rem; color: #c5e8c5; line-height: 1.2;
  overflow: hidden;
}

/* ── CONTENT ── */
#content {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}

/* ── VIDEO ── */
#video-wrap {
  flex: 1;
  position: relative;
  background: #000;
  min-height: 0;
}
#yt-player {
  width: 100%; height: 100%;
  border: none; display: block;
}

/* ── REST OVERLAY ── */
#rest-overlay {
  display: none;
  position: absolute; inset: 0;
  background: rgba(10,20,10,0.93);
  flex-direction: column;
  align-items: center; justify-content: center;
  gap: 10px;
  z-index: 10;
}
.rest-label { font-size: 0.8rem; color: #66bb6a; letter-spacing: 0.15em; text-transform: uppercase; }
#rest-count { font-size: 4rem; font-weight: 800; color: #a5d6a7; line-height: 1; }
#rest-next-name { font-size: 0.85rem; color: #6a9e6a; text-align: center; max-width: 240px; }
.skip-btn {
  margin-top: 6px; padding: 8px 20px;
  background: #2a3e2a; color: #a5d6a7;
  border: 1px solid #3a5a3a; border-radius: 8px;
  cursor: pointer; font-size: 0.8rem;
}
.skip-btn:hover { background: #334d33; }

/* ── BOTTOM BAR ── */
#bottom-bar {
  display: flex;
  align-items: stretch;
  background: #141f14;
  border-top: 1px solid #2a3e2a;
  height: 110px;
  flex-shrink: 0;
}

/* LEFT: stopwatch */
#stopwatch-area {
  width: 130px;
  flex-shrink: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  border-right: 1px solid #2a3e2a;
  padding: 8px;
  gap: 4px;
}
#timer-display {
  font-size: 1.5rem; font-weight: 700; color: #a5d6a7;
  font-variant-numeric: tabular-nums;
}
.timer-label { font-size: 0.58rem; color: #4a6a4a; text-transform: uppercase; letter-spacing: 0.08em; }
.timer-btns { display: flex; gap: 5px; }
.btn {
  padding: 4px 10px; border: none; border-radius: 5px;
  cursor: pointer; font-size: 0.68rem; font-weight: 600;
}
.btn-timer { background: #1b3e1b; color: #81c784; border: 1px solid #2e5c2e; }
.btn-timer:hover { background: #234d23; }

/* CENTER: cue */
#cue-area {
  flex: 1;
  padding: 10px 14px;
  display: flex; flex-direction: column; justify-content: center;
  overflow: hidden;
  border-right: 1px solid #2a3e2a;
}
#ex-cue {
  font-size: 0.78rem; color: #b0d8b0; line-height: 1.45;
  display: -webkit-box; -webkit-line-clamp: 4;
  -webkit-box-orient: vertical; overflow: hidden;
}

/* RIGHT: reps + nav */
#reps-area {
  width: 175px;
  flex-shrink: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 8px;
  gap: 5px;
}
#section-badge {
  font-size: 0.58rem; color: #66bb6a; text-transform: uppercase;
  letter-spacing: 0.06em; text-align: center;
}
#ex-reps-main {
  font-size: 0.85rem; font-weight: 700; color: #e8f5e9; text-align: center;
}
#nav-btns { display: flex; gap: 7px; align-items: center; margin-top: 2px; }
.btn-primary {
  background: linear-gradient(135deg, #2e7d32, #43a047);
  color: #fff; padding: 6px 14px; border-radius: 7px;
  font-size: 0.75rem; font-weight: 700;
}
.btn-primary:hover { background: linear-gradient(135deg, #388e3c, #4caf50); }
.btn-secondary {
  background: #2a3e2a; color: #a5d6a7;
  border: 1px solid #3a5a3a; padding: 6px 10px; border-radius: 7px;
  font-size: 0.75rem;
}
.btn-secondary:hover { background: #334d33; }

/* ── COMPLETE SCREEN ── */
#complete-screen {
  display: none;
  position: fixed; inset: 0;
  background: #0d1a0d;
  flex-direction: column; align-items: center; justify-content: center;
  gap: 12px; z-index: 100;
}
.complete-icon { font-size: 4rem; }
.complete-title { font-size: 2rem; font-weight: 800; color: #a5d6a7; }
.complete-sub { font-size: 1rem; color: #6a9e6a; }
.complete-stats { font-size: 0.85rem; color: #5a8a5a; margin-top: 8px; }
</style>
</head>
<body>
<div id="page">

<!-- TOP BAR -->
<div id="topbar">
  <a href="index.html" class="home-link">← Home</a>
  <div id="topbar-title">🏌️ Morning Flexibility</div>
  <div id="topbar-meta">Golf · Mobility · ~22 min</div>
  <div id="topbar-counter">1 / 13</div>
</div>

<!-- PROGRESS BAR -->
<div id="progress-wrap">
  <div id="progress-bar-bg">
    <div id="progress-bar-fill" style="width:0%"></div>
  </div>
</div>

<!-- MAIN -->
<div id="main">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <!-- Built by JS -->
  </div>

  <!-- CONTENT -->
  <div id="content">

    <!-- VIDEO -->
    <div id="video-wrap">
      <iframe id="yt-player"
        src=""
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
      </iframe>

      <!-- REST OVERLAY -->
      <div id="rest-overlay">
        <div class="rest-label">Rest</div>
        <div id="rest-count">15</div>
        <div id="rest-next-name"></div>
        <button class="skip-btn" onclick="skipRest()">Skip Rest →</button>
      </div>
    </div>

    <!-- BOTTOM BAR -->
    <div id="bottom-bar">

      <!-- LEFT: Stopwatch -->
      <div id="stopwatch-area">
        <div id="timer-display">0:00</div>
        <div class="timer-label">Stopwatch</div>
        <div class="timer-btns">
          <button class="btn btn-timer" onclick="toggleTimer()" id="timer-toggle-btn">Start</button>
          <button class="btn btn-timer" onclick="resetTimer()">Reset</button>
        </div>
      </div>

      <!-- CENTER: Cue -->
      <div id="cue-area">
        <div id="ex-cue">Loading...</div>
      </div>

      <!-- RIGHT: Reps + nav -->
      <div id="reps-area">
        <div id="section-badge">Section A</div>
        <div id="ex-reps-main">—</div>
        <div id="nav-btns">
          <button class="btn btn-secondary" onclick="prevExercise()">◀</button>
          <button class="btn btn-primary" onclick="markDone()">✓ Done</button>
          <button class="btn btn-secondary" onclick="nextExercise()">▶</button>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- COMPLETE SCREEN -->
<div id="complete-screen">
  <div class="complete-icon">🏆</div>
  <div class="complete-title">Workout Complete!</div>
  <div class="complete-sub">🏌️ Morning Flexibility</div>
  <div class="complete-stats" id="complete-stats"></div>
  <div style="margin-top:16px;display:flex;gap:12px;">
    <button class="btn btn-primary" onclick="restartWorkout()" style="padding:10px 22px;font-size:0.85rem;">▶ Start Again</button>
    <a href="index.html" class="btn btn-secondary" style="padding:10px 22px;font-size:0.85rem;text-decoration:none;">← Home</a>
  </div>
</div>

<script>
// ─── EXERCISE DATA ───────────────────────────────────────────
const exercises = [
  {
    section: 'A — Hip Mobility',
    name: '90/90 Hip Stretch',
    reps: '2 × 60 sec each side',
    cue:  'Front shin parallel, back shin parallel. Sit tall. Feel the deep glute stretch. Switch sides at the 60-sec mark — do both the front-shin and back-shin position.',
    videoId: 't4Zz6-aG8Iw',
    start: 18,
    end:   270,
    rest:  15
  },
  {
    section: 'A — Hip Mobility',
    name: 'Hip Flexor Lunge Stretch',
    reps: '2 × 45 sec each side',
    cue:  'Back knee down, drive hips forward gently. Squeeze the back glute. Left hip flexor is your lead side as a LH golfer — give it extra time.',
    videoId: 'iZ1eZBY4fwM',
    start: 12,
    end:   100,
    rest:  15
  },
  {
    section: 'A — Hip Mobility',
    name: 'Pigeon Pose',
    reps: '2 × 60 sec each side',
    cue:  'Chair version if floor is tough: cross ankle over opposite knee, lean forward gently. Great for external hip rotation and glute stretch.',
    videoId: '46phRH_09yM',
    start: 15,
    end:   120,
    rest:  15
  },
  {
    section: 'A — Hip Mobility',
    name: 'Lateral Side Lunge',
    reps: '10 reps each side × 2',
    cue:  'Step wide, shift weight side to side. Keep toes forward or slightly out. Feel inner thigh and hip open. Slow and controlled.',
    videoId: 'nWBKgtVjIjE',
    start: 10,
    end:   85,
    rest:  15
  },
  {
    section: 'B — Thoracic Spine',
    name: 'Open Books',
    reps: '10 each side × 2',
    cue:  'Lie on side, knees stacked. Keep knees together — only the upper body rotates. Follow your hand with your eyes. Great for desk posture.',
    videoId: '5TdmVlQe64c',
    start: 12,
    end:   100,
    rest:  15
  },
  {
    section: 'B — Thoracic Spine',
    name: 'Foam Roller T-Spine',
    reps: '2 × 60 sec — move up the spine',
    cue:  'Roller across upper/mid back. Arms crossed or behind head. Let gravity extend your spine over the roller. Move to a new spot every 30 sec.',
    videoId: 'J1-aNR1yby0',
    start: 20,
    end:   120,
    rest:  15
  },
  {
    section: 'B — Thoracic Spine',
    name: 'Cat-Cow',
    reps: '10 reps × 2',
    cue:  "Slow and deliberate. Full flexion to full extension. Breathe out on the round (cat), breathe in on the arch (cow). Don't rush this one.",
    videoId: 'KT6Fk7FWYfM',
    start: 10,
    end:   85,
    rest:  10
  },
  {
    section: 'B — Thoracic Spine',
    name: 'Thread the Needle',
    reps: '10 each side × 2',
    cue:  'On hands and knees. Slide one arm under your body, follow it with your eyes. Feel the thoracic spine open. Extra reps on draw-arm side for archery.',
    videoId: 'z-gJfzsPzlI',
    start: 14,
    end:   95,
    rest:  15
  },
  {
    section: 'B — Thoracic Spine',
    name: 'Chin Tucks',
    reps: '15 reps × 3',
    cue:  'Pull chin straight back — not down. Feel the back of neck lengthen. Counteracts forward head posture. Can do this sitting at your desk too.',
    videoId: 'O2kkwT6t3R0',
    start: 10,
    end:   80,
    rest:  10
  },
  {
    section: 'C — Shoulder & Arm',
    name: 'Cross-Body Shoulder Stretch',
    reps: '2 × 45 sec each side',
    cue:  "Pull arm across chest at shoulder height. Don't shrug. Right shoulder is your lead arm as a LH golfer — prioritize it. Good for archery draw arm too.",
    videoId: 'pD236y4-YRc',
    start: 8,
    end:   80,
    rest:  15
  },
  {
    section: 'C — Shoulder & Arm',
    name: 'Doorway Chest Stretch',
    reps: '2 × 45 sec',
    cue:  'Both arms at 90° on doorframe, step through gently. Opens chest and front shoulder. Counteracts desk rounding. Critical for both golf and archery posture.',
    videoId: 'M850sCj9LHQ',
    start: 14,
    end:   95,
    rest:  15
  },
  {
    section: 'D — Golf Drills',
    name: 'Hip Hinge Posture Drill',
    reps: '15 reps (slow)',
    cue:  'Hold club vertically against spine — touching head, upper back, and tailbone. Hinge forward from the hips. Grooves your golf address posture. Slow and deliberate.',
    videoId: 'Exe5K5EyV6Q',
    start: 18,
    end:   130,
    rest:  15
  },
  {
    section: 'D — Golf Drills',
    name: 'Slow Motion LH Swing',
    reps: '15 full swings — no ball',
    cue:  "Full LH swing in slow motion. Right arm stays extended on backswing. Left shoulder goes UNDER your chin at the top. Feel the shoulder turn — don't lift.",
    videoId: 'gqWY6A89VWU',
    start: 12,
    end:   200,
    rest:  0
  },
];

// ─── STATE ──────────────────────────────────────────────────
let current = 0;
let completed = new Set();

// Stopwatch
let swInterval = null;
let swSeconds = 0;
let swRunning = false;

// Rest timer
let restInterval = null;
let restRemaining = 0;

// ─── INIT ───────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  buildSidebar();
  loadExercise(0);
});

// ─── SIDEBAR ────────────────────────────────────────────────
function buildSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '';
  let lastSection = null;

  exercises.forEach((ex, i) => {
    if (ex.section !== lastSection) {
      const lbl = document.createElement('div');
      lbl.className = 'section-label';
      lbl.textContent = ex.section;
      sb.appendChild(lbl);
      lastSection = ex.section;
    }
    const item = document.createElement('div');
    item.className = 'ex-item' + (i === 0 ? ' active' : '');
    item.id = 'sb-item-' + i;
    item.onclick = () => loadExercise(i);
    item.innerHTML = `
      <span class="ex-num">${i + 1}</span>
      <span class="ex-check" id="sb-check-${i}">○</span>
      <span class="ex-name-short">${ex.name}</span>
    `;
    sb.appendChild(item);
  });
}

function updateSidebar(idx) {
  document.querySelectorAll('.ex-item').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
    el.classList.toggle('done', completed.has(i));
    document.getElementById('sb-check-' + i).textContent =
      completed.has(i) ? '✓' : (i === idx ? '▶' : '○');
  });
  // Scroll active item into view
  const active = document.getElementById('sb-item-' + idx);
  if (active) active.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ─── LOAD EXERCISE ──────────────────────────────────────────
function loadExercise(idx) {
  if (idx < 0 || idx >= exercises.length) return;
  current = idx;
  stopRest();

  const ex = exercises[idx];

  // Update UI
  document.getElementById('topbar-counter').textContent = `${idx + 1} / ${exercises.length}`;
  document.getElementById('section-badge').textContent = ex.section;
  document.getElementById('ex-reps-main').textContent = ex.reps;
  document.getElementById('ex-cue').textContent = ex.cue;

  // Video
  const startP = ex.start ? `&start=${ex.start}` : '';
  const endP   = ex.end   ? `&end=${ex.end}`     : '';
  document.getElementById('yt-player').src =
    `https://www.youtube.com/embed/${ex.videoId}?autoplay=1&rel=0&modestbranding=1${startP}${endP}`;

  // Progress bar
  const pct = Math.round((idx / exercises.length) * 100);
  document.getElementById('progress-bar-fill').style.width = pct + '%';

  updateSidebar(idx);
  resetTimer();
}

// ─── NAVIGATION ─────────────────────────────────────────────
function markDone() {
  completed.add(current);
  updateSidebar(current);
  const ex = exercises[current];
  if (ex.rest > 0) {
    startRest(ex.rest, current + 1);
  } else {
    advanceToNext();
  }
}

function nextExercise() {
  advanceToNext();
}

function prevExercise() {
  stopRest();
  if (current > 0) loadExercise(current - 1);
}

function advanceToNext() {
  stopRest();
  if (current + 1 < exercises.length) {
    loadExercise(current + 1);
  } else {
    showComplete();
  }
}

// ─── REST TIMER ─────────────────────────────────────────────
function startRest(seconds, nextIdx) {
  restRemaining = seconds;
  const nextName = nextIdx < exercises.length ? exercises[nextIdx].name : 'Workout Complete!';
  document.getElementById('rest-count').textContent = restRemaining;
  document.getElementById('rest-next-name').textContent = 'Up next: ' + nextName;
  document.getElementById('rest-overlay').style.display = 'flex';

  restInterval = setInterval(() => {
    restRemaining--;
    document.getElementById('rest-count').textContent = restRemaining;
    if (restRemaining <= 0) {
      skipRest();
    }
  }, 1000);
}

function skipRest() {
  stopRest();
  advanceToNext();
}

function stopRest() {
  clearInterval(restInterval);
  restInterval = null;
  document.getElementById('rest-overlay').style.display = 'none';
}

// ─── STOPWATCH ──────────────────────────────────────────────
function toggleTimer() {
  if (swRunning) {
    clearInterval(swInterval);
    swRunning = false;
    document.getElementById('timer-toggle-btn').textContent = 'Start';
  } else {
    swInterval = setInterval(() => {
      swSeconds++;
      const m = Math.floor(swSeconds / 60);
      const s = swSeconds % 60;
      document.getElementById('timer-display').textContent =
        m + ':' + String(s).padStart(2, '0');
    }, 1000);
    swRunning = true;
    document.getElementById('timer-toggle-btn').textContent = 'Pause';
  }
}

function resetTimer() {
  clearInterval(swInterval);
  swRunning = false;
  swSeconds = 0;
  document.getElementById('timer-display').textContent = '0:00';
  document.getElementById('timer-toggle-btn').textContent = 'Start';
}

// ─── COMPLETE ───────────────────────────────────────────────
function showComplete() {
  const el = document.getElementById('complete-screen');
  el.style.display = 'flex';
  document.getElementById('complete-stats').textContent =
    `${completed.size} of ${exercises.length} exercises completed`;
}

function restartWorkout() {
  completed.clear();
  document.getElementById('complete-screen').style.display = 'none';
  loadExercise(0);
}
</script>
</body>
</html>
